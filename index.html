<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">Truong An</div>

    <!-- Hamburger checkbox -->
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>

    <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Hi, I'm Truong An</h1>
    <p>Full-Stack Developer | UI Designer | Problem Solver</p>
    <a href="#portfolio" class="cta-button">View My Work</a>
</section>

<section id="about" class="about-section">
    <div class="container">
        <div class="about-grid">
            <div class="about-image">
                <img src="https://via.placeholder.com/400x400" alt="Profile">
            </div>
            <div class="about-content">
                <h2>About Me</h2>
                <p class="lead">I'm a passionate developer.</p>
                <p>I build modern web applications.</p>
            </div>
        </div>
    </div>
</section>

<section id="skills" class="skills-section">
    <div class="container">
        <h2>My Skills</h2>

        <div class="skills-grid">

            <div class="skill-item">
                <span>HTML</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="95%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span>CSS</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="90%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span>JavaScript</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="85%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span>React</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="80%"></div>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="js/main.js"></script>

</body>
</html>
