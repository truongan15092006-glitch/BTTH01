<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/skills.css">
    <link rel="stylesheet" href="css/portfolio.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">Truong An</div>

    <!-- Hamburger checkbox -->
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>

    <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Hi, I'm Truong An</h1>
    <p>Full-Stack Developer | UI Designer | Problem Solver</p>
    <a href="#portfolio" class="cta-button">View My Work</a>
</section>

<section id="about" class="about-section">
    <div class="container">
        <div class="about-grid">
            <div class="about-image">
                <img src="https://via.placeholder.com/400x400" alt="Profile">
            </div>
            <div class="about-content">
                <h2>About Me</h2>
                <p class="lead">I'm a passionate developer.</p>
                <p>I build modern web applications.</p>
            </div>
        </div>
    </div>
</section>

<section id="skills" class="skills-section">
    <div class="container">
        <h2>My Skills</h2>
        
        <div class="skills-grid">

            <div class="skill-item">
                <span>HTML<b>95%</b></span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="95%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span>CSS</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="90%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span>JavaScript</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="85%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span>React</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="80%"></div>
                </div>
            </div>

        </div>
    </div>
</section>

<section id="portfolio" class="portfolio-section">
    <div class="container">

        <!-- TITLE -->
        <h2>My Portfolio</h2>

        <!-- FILTER BUTTON -->
        <div class="portfolio-filters">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Web</button>
            <button class="filter-btn">Mobile</button>
            <button class="filter-btn">Design</button>
        </div>

        <!-- GRID -->
        <div class="portfolio-grid">

            <div class="portfolio-item">
                <a href="#lightbox-1">
                    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800&h=600&fit=crop">
                </a>
            </div>

            <div class="portfolio-item">
                <a href="#lightbox-2">
                    <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=800&h=600&fit=crop">
                </a>
            </div>

            <div class="portfolio-item">
                <a href="#lightbox-3">
                    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800&h=600&fit=crop">
                </a>
            </div>

            <div class="portfolio-item">
                <a href="#lightbox-4">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&h=600&fit=crop">
                </a>
            </div>

            <div class="portfolio-item">
                <a href="#lightbox-5">
                    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=800&h=600&fit=crop">
                </a>
            </div>

            <div class="portfolio-item">
                <a href="#lightbox-6">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop">
                </a>
            </div>

        </div>

    </div>
</section>

<!-- LIGHTBOX -->
<script src="js/main.js"></script>

</body>
</html>
